<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla Style Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Montserrat', sans-serif;
}

body {
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

/* HEADER */
.tesla-header {
  position: fixed;
  width: 100%;
  top: 0;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
  z-index: 1000;
  transition: 0.4s;
}

.tesla-header.scrolled {
  background: rgba(255,255,255,0.9);
  color: black;
  backdrop-filter: blur(10px);
}

.logo {
  letter-spacing: 10px;
  font-weight: 700;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 25px;
}

.nav-center a {
  text-decoration: none;
  color: inherit;
  font-size: 14px;
}

.nav-right {
  display: flex;
  gap: 15px;
}

.menu-btn {
  cursor: pointer;
}

/* SIDE MENU */
.side-menu {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  transition: 0.4s;
  padding: 20px;
  z-index: 2000;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  margin: 15px 0;
  text-decoration: none;
  color: black;
}

/* SECTIONS */
.section {
  height: 100vh;
  scroll-snap-align: start;
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  text-align: center;
  color: white;
  padding-top: 100px;
}

h1 {
  font-size: 40px;
}

.buttons {
  margin-bottom: 40px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 25px;
  border: none;
  cursor: pointer;
}

.dark { background: black; color: white; }
.light { background: white; color: black; }

/* MOBILE */
@media (max-width: 900px) {
  .nav-center {
    display: none;
  }

  /* DROPDOWN */
.dropdown {
  position: fixed;
  top: 70px;
  width: 100%;
  background: white;
  display: none;
  z-index: 999;
  padding: 30px 60px;
}

.dropdown.show {
  display: block;
}

/* GRID (3x2) */
.dropdown-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.dropdown-item {
  text-align: center;
  cursor: pointer;
}

.dropdown-item img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.dropdown-item p {
  margin-top: 10px;
  font-weight: 500;
}
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="tesla-header">
  <div class="logo">TESLA</div>

  <nav class="nav-center">
    <a href="#" class="nav-item" data-menu="vehicles">Vehicles</a>
    <a href="#" class="nav-item" data-menu="energy">Energy</a>
    <a href="#" class="nav-item" data-menu="charging">Charging</a>
  </nav>

  <div class="nav-right">
    <div class="menu-btn">Menu</div>
  </div>
</header>

<!-- DROPDOWN -->
<div class="dropdown" id="dropdown">
  <div class="dropdown-content" id="dropdown-content"></div>
</div>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
  <a href="#">Model S</a>
  <a href="#">Model 3</a>
  <a href="#">Model X</a>
  <a href="#">Model Y</a>
  <a href="#">Solar</a>
  <a href="#">Shop</a>
</div>

<!-- SECTIONS -->
<section class="section" style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')">
  <h1>Model S</h1>
  <div class="buttons">
    <button class="dark">Order</button>
    <button class="light">Learn</button>
  </div>
</section>

<section class="section" style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')">
  <h1>Model 3</h1>
  <div class="buttons">
    <button class="dark">Order</button>
    <button class="light">Learn</button>
  </div>
</section>

<section class="section" style="background-image:url('https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg')">
  <h1>Model X</h1>
  <div class="buttons">
    <button class="dark">Order</button>
    <button class="light">Learn</button>
  </div>
</section>

<script>
const header = document.querySelector('.tesla-header');
const menuBtn = document.querySelector('.menu-btn');
const menu = document.getElementById('menu');

window.addEventListener('scroll', () => {
  if (window.scrollY > 50) {
    header.classList.add('scrolled');
  } else {
    header.classList.remove('scrolled');
  }
});

menuBtn.addEventListener('click', () => {
  menu.classList.toggle('open');
});

  <script>
const navItems = document.querySelectorAll('.nav-item');
const dropdown = document.getElementById('dropdown');
const dropdownContent = document.getElementById('dropdown-content');

/* MENU DATA (Tesla-style vehicles) */
const menus = {
  vehicles: [
    { name: "Model S", img: "https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg" },
    { name: "Model 3", img: "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg" },
    { name: "Model X", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" },
    { name: "Model Y", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { name: "Cybertruck", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { name: "Roadster", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" }
  ],
  energy: [
    { name: "Solar Panels", img: "https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg" },
    { name: "Solar Roof", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg" },
    { name: "Powerwall", img: "https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg" }
  ],
  charging: [
    { name: "Supercharging", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg" },
    { name: "Home Charging", img: "https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg" }
  ]
};

/* SHOW MENU */
navItems.forEach(item => {
  item.addEventListener('mouseenter', () => {
    const menuType = item.dataset.menu;
    renderMenu(menuType);
    dropdown.classList.add('show');
  });
});

/* RENDER GRID */
function renderMenu(type) {
  const items = menus[type];

  dropdownContent.innerHTML = `
    <div class="dropdown-grid">
      ${items.map(i => `
        <div class="dropdown-item">
          <img src="${i.img}">
          <p>${i.name}</p>
        </div>
      `).join('')}
    </div>
  `;
}

/* KEEP OPEN WHEN HOVERING DROPDOWN */
dropdown.addEventListener('mouseenter', () => {
  dropdown.classList.add('show');
});

/* CLOSE WHEN CLICK OUTSIDE */
document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-center') && !e.target.closest('.dropdown')) {
    dropdown.classList.remove('show');
  }
});
</script>

</body>
</html>
