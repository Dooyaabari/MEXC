<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Style Clone</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

/* ================= HERO ================= */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* SLIDER */
.slider {
  position: absolute;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active {
  opacity: 1;
}

/* ================= NAVBAR ================= */
.navbar {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  color: white;
}

/* LOGO */
.logo {
  font-size: 18px;
  font-weight: bold;
  letter-spacing: 3px;
}

/* CENTER MENU */
.nav-center {
  display: flex;
  gap: 26px;
}

.nav-item {
  cursor: pointer;
  font-size: 14px;
  color: white;
}

/* RIGHT SIDE */
.nav-right {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 14px;
}

/* ICON STYLE */
.icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  background: rgba(255,255,255,0.15);
  color: white;
}

/* ================= DROPDOWN ================= */
.dropdown {
  position: absolute;
  top: 70px;
  width: 100%;
  display: none;
  z-index: 20;
}

.dropdown.show {
  display: block;
  backdrop-filter: blur(18px);
  background: rgba(235, 235, 235, 0.72);
}

/* GRID */
.dropdown-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 30px;
  padding: 60px 80px;
}

/* ITEM */
.dropdown-item img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 6px;
}

.dropdown-item p {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
  color: #111;
}

/* ================= MOBILE ================= */
.mobile-menu {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

/* RESPONSIVE */
@media (max-width: 900px) {

  .nav-center {
    display: none;
  }

  .mobile-menu {
    display: block;
  }

  .dropdown-grid {
    grid-template-columns: 1fr;
    padding: 30px;
  }

  .navbar {
    padding: 15px 20px;
  }
}

/* FAKE SCROLL CONTENT */
.content {
  height: 150vh;
  background: #111;
}

  .car-carousel {
  background: #fff;
  padding: 80px 40px;
}

.carousel-title {
  font-size: 28px;
  margin-bottom: 30px;
}

/* horizontal scroll container */
.carousel-track {
  display: flex;
  gap: 25px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 20px;
}

/* hide scrollbar (clean Tesla look) */
.carousel-track::-webkit-scrollbar {
  display: none;
}

.car-card {
  min-width: 320px;
  flex: 0 0 auto;
  scroll-snap-align: start;
  border-radius: 10px;
  overflow: hidden;
  background: #f5f5f5;
  transition: transform 0.3s ease;
}

.car-card:hover {
  transform: scale(1.03);
}

.car-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.car-card h3 {
  padding: 15px 15px 5px;
}

.car-card p {
  padding: 0 15px 20px;
  color: #555;
}
  }
</style>
</head>

<body>

<header class="hero">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slide active" style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')"></div>
    <div class="slide" style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')"></div>
    <div class="slide" style="background-image:url('https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg')"></div>
  </div>

  <!-- NAVBAR -->
  <div class="navbar">

    <div class="logo">TESLA</div>

    <nav class="nav-center">
      <div class="nav-item" data-menu="vehicles">Vehicles</div>
      <div class="nav-item" data-menu="energy">Energy</div>
      <div class="nav-item" data-menu="charging">Charging</div>
      <div class="nav-item" data-menu="discover">Discover</div>
      <div class="nav-item" data-menu="shop">Shop</div>
    </nav>

    <div class="nav-right">
      <div class="icon">S</div>
      <div class="icon">A</div>
      <div class="mobile-menu">☰</div>
    </div>

  </div>

  <!-- DROPDOWN -->
  <div id="dropdown" class="dropdown">
    <div id="dropdown-content"></div>
  </div>

</header>

<div class="content"></div>


<section class="car-carousel">

  <h2 class="carousel-title">Discover Vehicles</h2>

  <div class="carousel-track">

    <div class="car-card">
      <img src="https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg">
      <h3>Model S</h3>
      <p>From $74,990</p>
    </div>

    <div class="car-card">
      <img src="https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg">
      <h3>Model 3</h3>
      <p>From $39,990</p>
    </div>

    <div class="car-card">
      <img src="https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg">
      <h3>Model X</h3>
      <p>From $79,990</p>
    </div>

    <div class="car-card">
      <img src="https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg">
      <h3>Model Y</h3>
      <p>From $44,990</p>
    </div>

    <div class="car-card">
      <img src="https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg">
      <h3>Cybertruck</h3>
      <p>Coming Soon</p>
    </div>

  </div>

</section>
  
<script>

const navItems = document.querySelectorAll('.nav-item');
const dropdown = document.getElementById('dropdown');
const dropdownContent = document.getElementById('dropdown-content');

/* FULL MENU DATA */
const menus = {
  vehicles: [
    { name: "Model S", img: "https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg" },
    { name: "Model 3", img: "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg" },
    { name: "Model X", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" },
    { name: "Model Y", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { name: "Cybertruck", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" }
  ],

  energy: [
    { name: "Solar Panels", img: "https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg" },
    { name: "Solar Roof", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg" },
    { name: "Powerwall", img: "https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg" }
  ],

  charging: [
    { name: "Supercharging", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg" },
    { name: "Home Charging", img: "https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg" }
  ],

  discover: [
    { name: "Our Story", img: "https://images.pexels.com/photos/386009/pexels-photo-386009.jpeg" },
    { name: "Careers", img: "https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg" },
    { name: "Investor Relations", img: "https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg" }
  ],

  shop: [
    { name: "Vehicle Accessories", img: "https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg" },
    { name: "Charging Gear", img: "https://images.pexels.com/photos/163210/pexels-photo-163210.jpeg" },
    { name: "Apparel", img: "https://images.pexels.com/photos/1002649/pexels-photo-1002649.jpeg" }
  ]
};

/* DROPDOWN */
navItems.forEach(item => {
  item.addEventListener('mouseenter', () => {
    renderMenu(item.dataset.menu);
    dropdown.classList.add('show');
  });
});

function renderMenu(type) {
  dropdownContent.innerHTML = `
    <div class="dropdown-grid">
      ${menus[type].map(i => `
        <div class="dropdown-item">
          <img src="${i.img}">
          <p>${i.name}</p>
        </div>
      `).join('')}
    </div>
  `;
}

/* CLOSE DROPDOWN */
document.addEventListener('click', (e) => {
  if (!e.target.closest('.navbar') && !e.target.closest('.dropdown')) {
    dropdown.classList.remove('show');
  }
});

/* SLIDER */
const slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 4000);

  html {
  scroll-behavior: smooth;
}
  
</script>

</body>
</html>
