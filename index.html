<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tesla Style Clone</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: sans-serif;
}

/* HERO SECTION */
.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

/* SLIDER */
.slider {
  position: absolute;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active {
  opacity: 1;
}

/* NAVBAR */
.nav-center {
  position: relative;
  z-index: 10;
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px;
  color: white;
  font-weight: bold;
}

.nav-item {
  cursor: pointer;
}

/* DROPDOWN */
.dropdown {
  position: absolute;
  top: 70px;
  width: 100%;
  background: white;
  display: none;
  z-index: 20;
}

.dropdown.show {
  display: block;
}

.dropdown-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  padding: 30px;
  gap: 20px;
}

.dropdown-item img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.dropdown-item p {
  text-align: center;
  margin-top: 10px;
}

/* FAKE CONTENT BELOW (to test scroll) */
.content {
  height: 150vh;
  background: #111;
}
</style>
</head>

<body>

<header class="hero">

  <!-- SLIDER -->
  <div class="slider">
    <div class="slide active" style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')"></div>
    <div class="slide" style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')"></div>
    <div class="slide" style="background-image:url('https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg')"></div>
  </div>

  <!-- NAV -->
  <nav class="nav-center">
    <div class="nav-item" data-menu="vehicles">Vehicles</div>
    <div class="nav-item" data-menu="energy">Energy</div>
    <div class="nav-item" data-menu="charging">Charging</div>
  </nav>

  <!-- DROPDOWN -->
  <div id="dropdown" class="dropdown">
    <div id="dropdown-content"></div>
  </div>

</header>

<!-- EXTRA CONTENT -->
<div class="content"></div>

<script>
const navItems = document.querySelectorAll('.nav-item');
const dropdown = document.getElementById('dropdown');
const dropdownContent = document.getElementById('dropdown-content');

/* MENU DATA */
const menus = {
  vehicles: [
    { name: "Model S", img: "https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg" },
    { name: "Model 3", img: "https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg" },
    { name: "Model X", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" },
    { name: "Model Y", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { name: "Cybertruck", img: "https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg" },
    { name: "Roadster", img: "https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg" }
  ],
  energy: [
    { name: "Solar Panels", img: "https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg" },
    { name: "Solar Roof", img: "https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg" },
    { name: "Powerwall", img: "https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg" }
  ],
  charging: [
    { name: "Supercharging", img: "https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg" },
    { name: "Home Charging", img: "https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg" }
  ]
};

/* SHOW MENU */
navItems.forEach(item => {
  item.addEventListener('mouseenter', () => {
    const menuType = item.dataset.menu;
    renderMenu(menuType);
    dropdown.classList.add('show');
  });
});

/* RENDER GRID */
function renderMenu(type) {
  const items = menus[type];

  dropdownContent.innerHTML = `
    <div class="dropdown-grid">
      ${items.map(i => `
        <div class="dropdown-item">
          <img src="${i.img}">
          <p>${i.name}</p>
        </div>
      `).join('')}
    </div>
  `;
}

/* KEEP OPEN */
dropdown.addEventListener('mouseenter', () => {
  dropdown.classList.add('show');
});

/* CLOSE */
document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-center') && !e.target.closest('.dropdown')) {
    dropdown.classList.remove('show');
  }
});

/* ========================= */
/* HERO SLIDER (FIXED) */
/* ========================= */

const slides = document.querySelectorAll('.slide');
let currentSlide = 0;

function showSlide(index) {
  slides.forEach(slide => slide.classList.remove('active'));
  slides[index].classList.add('active');
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % slides.length;
  showSlide(currentSlide);
}

/* AUTO LOOP */
setInterval(nextSlide, 4000);

</script>

</body>
</html>
