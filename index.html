<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesla UI Clone</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{background:#fff;}

/* ================= HERO ================= */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:absolute;
  width:100%;
  height:100%;
}

/* IMAGE SLIDES */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s ease;
}

.slide.active{
  opacity:1;
}

/* VIDEO SLIDE */
.video-slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:1s ease;
}

.video-slide video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.video-slide.active{
  opacity:1;
}

/* HERO TEXT */
.hero-content{
  position:absolute;
  top:22%;
  width:100%;
  text-align:center;
  color:#fff;
  z-index:5;
}

.hero-content h1{
  font-size:clamp(32px,5vw,50px);
}

.hero-buttons{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.btn{
  padding:12px 26px;
  border-radius:25px;
  border:none;
  cursor:pointer;
}

.primary{
  background:#000;
  color:#fff;
}

.secondary{
  background:rgba(255,255,255,0.8);
  color:#000;
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:20;

  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 5vw;

  background:#fff;
  color:#000;
}

.navbar.active{
  background:rgba(245,245,245,0.92);
}

.logo{
  font-weight:bold;
  letter-spacing:3px;
  color:#000;
}

.nav-center{
  display:flex;
  gap:25px;
}

.nav-item{
  cursor:pointer;
  font-size:14px;
  color:#000;
}

.nav-right{
  display:flex;
  gap:10px;
}

.icon{
  width:32px;
  height:32px;
  border-radius:50%;
  background:rgba(0,0,0,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= DROPDOWN ================= */
.dropdown{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:none;
  z-index:10;
}

.dropdown.show{
  display:block;
  backdrop-filter:blur(22px);
  background:rgba(245,245,245,0.92);
  padding-top:90px;
}

.dropdown-wrapper{
  padding:40px 5vw;
}

.dropdown-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:30px;
}

.dropdown-item{
  text-align:center;
}

.dropdown-item img{
  width:100%;
  height:120px;
  object-fit:contain;
}

.links{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:6px;
}

.links a{
  font-size:13px;
  color:#000;
  text-decoration:underline;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
  .nav-center{display:none;}
  .dropdown-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="hero">

<!-- ================= SLIDER ================= -->
<div class="slider">

  <div class="slide active" data-title="Model S"
    style="background-image:url('https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg')">
  </div>

  <div class="slide" data-title="Model 3"
    style="background-image:url('https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg')">
  </div>

  <div class="slide" data-title="Model X"
    style="background-image:url('https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg')">
  </div>

  <!-- ✅ CYBERTRUCK VIDEO (WORKING AUTOPLAY FIXED) -->
  <div class="video-slide slide" data-title="Cybertruck Autopilot">
    <video muted autoplay loop playsinline>
      <source src="https://cdn.coverr.co/videos/coverr-driving-a-tesla-7-1525/1080p.mp4" type="video/mp4">
    </video>
  </div>

</div>

<!-- HERO TEXT -->
<div class="hero-content">
  <h1 id="heroTitle">Model S</h1>

  <div class="hero-buttons">
    <button class="btn primary">Order Now</button>
    <button class="btn secondary">View Inventory</button>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">TESLA</div>

  <div class="nav-center">
    <div class="nav-item" data-menu="vehicles">Vehicles</div>
    <div class="nav-item" data-menu="energy">Energy</div>
    <div class="nav-item" data-menu="charging">Charging</div>
    <div class="nav-item" data-menu="discover">Discover</div>
    <div class="nav-item" data-menu="shop">Shop</div>
  </div>

  <div class="nav-right">
    <div class="icon">S</div>
    <div class="icon">A</div>
    <div class="icon">☰</div>
  </div>
</div>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
  <div id="dropdown-content"></div>
</div>

</header>

<script>

/* ================= SLIDER LOGIC ================= */
const slides = document.querySelectorAll('.slide');
const heroTitle = document.getElementById('heroTitle');

let current = 0;

function updateSlide(index){
  heroTitle.textContent = slides[index].dataset.title;
}

function switchSlides(next){

  const prev = current;

  slides[prev].classList.remove('active');

  const prevVideo = slides[prev].querySelector('video');
  if(prevVideo){
    prevVideo.pause();
    prevVideo.currentTime = 0;
  }

  current = next;

  slides[current].classList.add('active');

  const newVideo = slides[current].querySelector('video');
  if(newVideo){
    newVideo.play().catch(()=>{});
  }

  updateSlide(current);
}

setInterval(()=>{
  let next = (current + 1) % slides.length;
  switchSlides(next);
}, 4000);

/* FORCE VIDEO AUTOPLAY ON LOAD */
window.addEventListener('load', ()=>{
  const v = document.querySelector('.video-slide video');
  if(v){
    v.play().catch(()=>{});
  }
});

/* ================= MENU ================= */
const menus={
vehicles:[
{name:"Model S",img:"https://images.pexels.com/photos/3729464/pexels-photo-3729464.jpeg"},
{name:"Model 3",img:"https://images.pexels.com/photos/170811/pexels-photo-170811.jpeg"},
{name:"Model X",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"},
{name:"Model Y",img:"https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg"},
{name:"Cybertruck",img:"https://upload.wikimedia.org/wikipedia/commons/4/4d/Tesla_Cybertruck_outside_unveil_modified_by_Smnt.jpg"},
{name:"Roadster",img:"https://images.pexels.com/photos/210019/pexels-photo-210019.jpeg"}
],
energy:[
{name:"Solar Panels",img:"https://images.pexels.com/photos/9875441/pexels-photo-9875441.jpeg"},
{name:"Solar Roof",img:"https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg"},
{name:"Powerwall",img:"https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg"},
{name:"Megapack",img:"https://images.pexels.com/photos/159298/gears-cogs-machine-machinery-159298.jpeg"},
{name:"Energy Software",img:"https://images.pexels.com/photos/356036/pexels-photo-356036.jpeg"}
],
charging:[
{name:"Supercharger",img:"https://images.pexels.com/photos/110844/pexels-photo-110844.jpeg"},
{name:"Home Charging",img:"https://images.pexels.com/photos/259588/pexels-photo-259588.jpeg"}
],
discover:[
{name:"Demo Drive",img:"https://images.pexels.com/photos/386009/pexels-photo-386009.jpeg"},
{name:"Insurance",img:"https://images.pexels.com/photos/3184291/pexels-photo-3184291.jpeg"}
],
shop:[
{name:"Accessories",img:"https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg"},
{name:"Apparel",img:"https://images.pexels.com/photos/1002649/pexels-photo-1002649.jpeg"}
]
};

const navItems=document.querySelectorAll('.nav-item');
const dropdown=document.getElementById('dropdown');
const dropdownContent=document.getElementById('dropdown-content');

navItems.forEach(item=>{
item.addEventListener('mouseenter',()=>{
renderMenu(item.dataset.menu);
dropdown.classList.add('show');
document.querySelector('.navbar').classList.add('active');
});
});

function renderMenu(type){
dropdownContent.innerHTML=`
<div class="dropdown-wrapper">
<div class="dropdown-grid">
${menus[type].map(i=>`
<div class="dropdown-item">
<img src="${i.img}">
<h4>${i.name}</h4>
<div class="links">
<a href="#">Learn</a>
<a href="#">Order</a>
</div>
</div>`).join('')}
</div>
</div>`;
}

document.addEventListener('click',e=>{
if(!e.target.closest('.navbar')&&!e.target.closest('.dropdown')){
dropdown.classList.remove('show');
document.querySelector('.navbar').classList.remove('active');
}
});

</script>

</body>
</html>
